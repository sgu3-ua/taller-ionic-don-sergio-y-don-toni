<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Wiki
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Wiki</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list-header>Categories</ion-list-header>
  <ion-content [fullscreen]="true">
    <ion-list-header>
      <ion-label size="large">Categories</ion-label>
    </ion-list-header>
    <ion-list>
      <app-category *ngFor="let cat of
        categories" [theCategory]="cat"
        [selected]="selectedCategory==cat.name"
        (clicked)="selectCategory($event)">
      </app-category>
    </ion-list>
  </ion-content>

</ion-content>
